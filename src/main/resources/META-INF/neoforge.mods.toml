# This is a neoforge.mods.toml file for First Person Model x Better Combat Compat.

modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "fpm_bc_compat"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "Kaokod"
description = '''
Technical compatibility fix for First Person Model, Better Combat, Spell Engine, and Combat Roll.
Dynamically aligns arm rendering with camera pitch for a seamless combat experience.
'''

[[mixins]]
config = "fpm_bc_compat.mixins.json"

[[dependencies.fpm_bc_compat]]
modId = "neoforge"
type = "required"
versionRange = "[${neo_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.fpm_bc_compat]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.fpm_bc_compat]]
modId = "playeranimator"
type = "required"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Provides the animation API for Mixin injection."

[[dependencies.fpm_bc_compat]]
modId = "cloth_config"
type = "required"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Provides the configuration GUI."

[[dependencies.fpm_bc_compat]]
modId = "firstperson"
type = "required"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Primary mod for first-person body rendering. The core of this compatibility fix."

[[dependencies.fpm_bc_compat]]
modId = "bettercombat"
type = "required"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Required for dynamic combat animation synchronization."

[[dependencies.fpm_bc_compat]]
modId = "spell_engine"
type = "optional"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Optional integration for spell casting animations."

[[dependencies.fpm_bc_compat]]
modId = "combatroll"
type = "optional"
versionRange = "${mod_wildcard_version}"
ordering = "AFTER"
side = "CLIENT"
reason = "Optional integration to prevent visual glitches during rolls."
